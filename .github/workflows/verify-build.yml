name: 🛡️ Enterprise Production Quality CI

on:
  push:
    branches: [ main, master, development ]
  pull_request:
    branches: [ main, master ]

jobs:
  validate:
    runs-on: ubuntu-latest
    name: Codebase Health, Style and Security Audit
    
    steps:
    - name: Clone Repository Footprints
      uses: actions/checkout@v4

    - name: Bootstrap Hardened Node runtime
      uses: actions/setup-node@v4
      with:
        node-version: 22
        cache: 'npm'

    - name: Restore/Assemble Packages Cache
      run: npm ci

    - name: Run Syntax & Typecheck Audit
      run: npm run lint

    - name: Run Build Target Compile
      run: npm run build
